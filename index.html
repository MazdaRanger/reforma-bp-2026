
<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <meta
      name="description"
      content="ReForma Body & Paint System"
    />
    <title>ReForma BP System</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      :root {
        --ink: #111111;
        --canvas: #ffffff;
        --soft-cloud: #f5f5f5;
        --hairline: #cacacb;
        --hairline-soft: #e5e5e5;
        --charcoal: #39393b;
        --ash: #4b4b4d;
        --mute: #707072;
        --stone: #9e9ea0;
        
        --card-teal: #0f766e;
        --card-emerald: #047857;
        --card-navy: #1e3a8a;
        --card-ruby: #991b1b;
        --card-gold: #b8860b;
      }
      .dark {
        --ink: #ffffff;
        --canvas: #121212;
        --soft-cloud: #1a1a1a;
        --hairline: #333333;
        --hairline-soft: #2a2a2a;
        --charcoal: #b0b0b0;
        --ash: #909090;
        --mute: #a0a0a0;
        --stone: #707070;
        
        --card-teal: #115e59;
        --card-emerald: #065f46;
        --card-navy: #1e40af;
        --card-ruby: #7f1d1d;
        --card-gold: #854d0e;
      }
      body {
        background-color: var(--soft-cloud);
        color: var(--ink);
        transition: background-color 0.3s ease, color 0.3s ease;
      }
    </style>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              ink: 'var(--ink)',
              canvas: 'var(--canvas)',
              'soft-cloud': 'var(--soft-cloud)',
              hairline: 'var(--hairline)',
              'hairline-soft': 'var(--hairline-soft)',
              charcoal: 'var(--charcoal)',
              ash: 'var(--ash)',
              mute: 'var(--mute)',
              stone: 'var(--stone)',
              sale: '#d30005',
              'sale-deep': '#780700',
              success: '#007d48',
              'success-bright': '#1eaa52',
              info: '#1151ff',
              'info-deep': '#0034e3',
              'on-primary': 'var(--canvas)',
              primary: { DEFAULT: 'var(--ink)', foreground: 'var(--canvas)' },
              background: 'var(--soft-cloud)',
              foreground: 'var(--ink)',
              card: { DEFAULT: 'var(--canvas)', foreground: 'var(--ink)' },
              border: 'var(--hairline)',
              textPrimary: 'var(--ink)',
              textSecondary: 'var(--mute)',
              'card-teal': 'var(--card-teal)',
              'card-emerald': 'var(--card-emerald)',
              'card-navy': 'var(--card-navy)',
              'card-ruby': 'var(--card-ruby)',
              'card-gold': 'var(--card-gold)'
            },
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              display: ['Bebas Neue', 'sans-serif']
            },
            spacing: {
              xxs: '2px',
              xs: '4px',
              sm: '8px',
              md: '12px',
              lg: '18px',
              xl: '24px',
              xxl: '30px',
              section: '48px',
            },
            borderRadius: {
              none: '0px',
              sm: '12px',
              md: '16px',
              lg: '24px',
              full: '9999px',
            },
            boxShadow: {
              none: 'none',
              'inset-bottom': 'inset 0 -1px 0 var(--hairline-soft)'
            }
          }
        }
      }
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
  <script type="importmap">
{
  "imports": {
    "lucide-react": "https://esm.sh/lucide-react@^0.561.0",
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "firebase/": "https://esm.sh/firebase@^12.6.0/",
    "react-chartjs-2": "https://esm.sh/react-chartjs-2@^5.3.1",
    "chart.js": "https://esm.sh/chart.js@^4.5.1",
    "xlsx": "https://esm.sh/xlsx@0.18.5",
    "jspdf-autotable": "https://esm.sh/jspdf-autotable@^5.0.2",
    "jspdf": "https://esm.sh/jspdf@^3.0.4",
    "@google/genai": "https://esm.sh/@google/genai@^1.34.0"
  }
}
</script>
<style>
  /* Custom Scrollbar for Glass UI */
  ::-webkit-scrollbar {
    width: 8px;
    height: 8px;
  }
  ::-webkit-scrollbar-track {
    background: transparent; 
  }
  ::-webkit-scrollbar-thumb {
    background: #cbd5e1; 
    border-radius: 4px;
  }
  ::-webkit-scrollbar-thumb:hover {
    background: #94a3b8; 
  }
</style>
<link rel="stylesheet" href="/index.css">
</head>
  <body class="bg-background text-textPrimary font-sans antialiased min-h-screen selection:bg-primary/20 selection:text-primary">
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
